<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basket</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <div class="container">
        <nav class="navbar navbar-expand-lg mt-2 fs-5">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">Products</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav ms-auto">
                        <a class="nav-link" href="index.html">Home</a>
                        <a class="nav-link" href="#">Catalog</a>
                        <a class="nav-link" href="#">Contact</a>
                        <a class="nav-link mt-1 basket-link active" aria-current="page" href="basket.html"
                            aria-label="Shopping basket">
                            <i class="fa-solid fa-basket-shopping"></i>
                            <span id="cart-count" class="cart-count">0</span>
                        </a>
                    </div>
                </div>
            </div>
        </nav>
    </div>

    <main class="container mt-4 mb-5">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
            <h2 class="mb-0">My Basket</h2>
            <a href="index.html" class="btn btn-outline-primary">Continue Shopping</a>
        </div>

        <div class="table-responsive">
            <table class="table align-middle basket-table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Count</th>
                        <th>Total</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="cart-items-body"></tbody>
            </table>
        </div>

        <p id="empty-cart-message" class="text-muted mt-3 d-none">Basket is empty.</p>

        <div class="basket-summary mt-4">
            <div class="d-flex justify-content-between">
                <span>Different products:</span>
                <strong id="summary-distinct-count">0</strong>
            </div>
            <div class="d-flex justify-content-between mt-2">
                <span>Total quantity:</span>
                <strong id="summary-total-quantity">0</strong>
            </div>
            <div class="d-flex justify-content-between mt-2 fs-5">
                <span>Grand total:</span>
                <strong id="summary-grand-total">$0.00</strong>
            </div>
            <button id="clear-cart-btn" class="btn btn-danger mt-3">Clear Basket</button>
        </div>
    </main>

    <script src="./assets/js/basket.js"></script>
</body>
