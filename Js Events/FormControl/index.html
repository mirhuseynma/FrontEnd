<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <div class="form-controller container">
        <h1>My Form</h1>
        <form class="form" action="/">
            <div class="box-label mb-3">
                <label for="name" class="form-label">Username</label>
                <input  type="text" class="form-control" id="name">
                <small class="error name-error"></small>
            </div>
            <div class="box-label mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email">
                <small class="error email-error"></small>
            </div>
            <div class="box-label mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password">
                <small class="error password-error"></small>
            </div>
            <div class="box-label mb-3">
                <label for="submitpassword" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="submitpassword">
                <small class="error submitpassword-error"></small>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>
</body>

<script src="./assets/js/script.js"></script>
</html>
