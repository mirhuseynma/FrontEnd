<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container d-flex flex-column align-items-center mt-5 ">
        <div class="inputs row w-50">
            <div class="numberOne col-md-6 mt-3">
                <input type="number" id="num1" class="form-control" placeholder="Enter first number">
            </div>
            <div class="numberTwo col-md-6 mt-3">
                <input type="number" id="num2" class="form-control" placeholder="Enter second number">
            </div>
        </div>

        <div class="result mt-3 w-25">
            <div class="result-output ">
                <input type="number" id="result" class="form-control" placeholder="Result" readonly>
            </div>
        </div>

        <div class="operations mt-3">
            <button id="add" class="btn btn-primary">+</button>
            <button id="subtract" class="btn btn-secondary">-</button>
            <button id="multiply" class="btn btn-success">*</button>
            <button id="divide" class="btn btn-danger">/</button>
            <button id="clear" class="btn btn-warning">Clear</button>
        </div>
    </div>
</body>
<script src="./assets/js/script.js"></script>

</html>
