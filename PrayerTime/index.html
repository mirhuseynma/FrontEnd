<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Prayer Times</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body class="bg-body-tertiary">
    <main class="container py-4 py-md-5">
        <section class="hero card border-0 shadow-sm overflow-hidden mb-4">
            <div class="card-body p-4 p-md-5">
                <div class="d-flex flex-column flex-lg-row gap-3 align-items-lg-end justify-content-between">
                    <div>
                        <h1 class="h3 mb-1">Monthly Prayer Program</h1>
                        <p class="text-secondary mb-0">Daily prayer times for your location</p>
                    </div>
                    <div class="d-flex flex-wrap gap-2 align-items-end">
                        <div>
                            <label for="monthSelect" class="form-label mb-1 small">Month</label>
                            <select id="monthSelect" class="form-select"></select>
                        </div>
                        <div>
                            <label for="yearSelect" class="form-label mb-1 small">Year</label>
                            <select id="yearSelect" class="form-select"></select>
                        </div>
                        <div>
                            <label for="countrySelect" class="form-label mb-1 small">Country</label>
                            <select id="countrySelect" class="form-select"></select>
                        </div>
                        <button id="refreshBtn" class="btn btn-primary">Refresh</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="row g-4">
            <div class="col-12 col-xl-4">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body">
                        <p id="todayDate" class="small text-secondary mb-2">Today</p>
                        <h2 class="h5 mb-3">Today's Prayer Times</h2>
                        <div id="today" class=" gap-2"></div>
                        <p id="nextPrayerInfo" class="alert alert-success mt-3 mb-0 py-2 px-3 d-none"></p>
                    </div>
                </div>
            </div>

            <div class="col-12 col-xl-8">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h2 class="h5 mb-0">Monthly Calendar</h2>
                            <span id="status" class="small text-secondary">Loading...</span>
                        </div>
                        <div id="calendar" class="table-responsive"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
<script type="module" src="./assets/js/script.js"></script>
</html>
