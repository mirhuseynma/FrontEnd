<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Card</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <div id="wedding-card">
        <div class="style-font">
            <h1>The Wedding Of</h1>
        </div>

        <div class="name">
            <h1>Lauren Hall & Jordon Quinn</h1>
        </div>

        <div class="join">
            <h2>Please join us</h2>
        </div>

        <div class="date">
            <h2>Friday, 24th April 2019</h2>
            <p> 2 O'CLOCK</p>
        </div>

        <div class="location">
            <h2>Winchester House</h2>
        </div>

        <div class="message">
            <p>Reception to follow!</p>
        </div>

    </div>
</body>
</html>
