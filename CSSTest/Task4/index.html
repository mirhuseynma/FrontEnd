<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tedris Saheleri</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <div id="general-container">
        <!-- left -->
        <div id="left">
            <div class="header">
                <h1>tədris</h1>
                <p>sahələri</p>
            </div>

            <div class="line"></div>

            <div class="description">
                <p>İnformasiya Texnologiyaları sahəsində bugünün və gələcəyin ən tələb edilən istiqamətləri</p>
            </div>
        </div>

        <!-- right -->
        <div id="right">
            <div class="up">
                <div class="up-left">
                    <img class="img" src="./assets/images/1.png" alt="">
                    <h2 class="saheler">Dijital Marketinq</h2>
                </div>
                <div class="up-right">
                    <img class="img" src="./assets/images/2.png" alt="">
                    <h2 class="saheler">Dizayn</h2>
                </div>
            </div>

            <div class="down">
                <div class="down-left">
                    <img class="img" src="./assets/images/3.png" alt="">
                    <h2 class="saheler">Proqramlaşdırma</h2>
                </div>
                <div class="down-right">
                    <img class="img" src="./assets/images/4.png" alt="">
                    <h2 class="saheler">Sistem və Şəbəkə</h2>
                </div>
            </div>
        </div>

</html>
